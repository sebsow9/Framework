role: sender  # default; overridden by ROLE env var in Docker

network:
  receiver_host: receiver  # Docker service name; change to IP for remote deployment
  port: 1234
  receiver_timeout_ms: 10000  # ms of silence before receiver closes — must exceed sender startup time

# ------------------------------------------------------------------------------------------------------------------------------------------
# NOTE: If both audio and video blocks are present, the framework will prioritize video transmission and skip sending a separate audio file.

# video:
#   source: /media/input.mp4      # mounted into sender container
#   output: /results/received.mp4 # written by receiver container
#   codec: libx264
#   bitrate: 2M
#   fps: 30

audio:                          # If not testing for audio quality, comment out the entire "audio"  block
  source: /media/input.wav      # <- source and output arguments required, the rest is not.
  output: /results/received.wav #
  sample_format: s16le          #  These arguments set parameters of FFMPEG's output stream.
  codec: pcm_s16le              #   If not specified, values representing CD quality
  sample_rate: "44100"          #   will be supplied by default at runtime.
  channels: "2"                 #  These number values must be strings!

sender:
  startup_delay: 3  # seconds to wait before streaming, giving receiver time to bind

logging:
  level: INFO

# Plugin (optional) — comment out the entire block to use plain UDP
# plugin:
#   name: aes_ctr   # module name inside framework/plugins/ (without .py)
                   # built-in: aes_ctr
                   # custom:   drop your module in framework/plugins/ and set name
