services:
  receiver:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: receiver
    environment:
      - ROLE=receiver
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./results:/results
    networks:
      - stream_net
    cpus: 0.25
    cpu_shares: 8
    mem_limit: 1G
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 1G

  sender:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sender
    environment:
      - ROLE=sender
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./framework/media:/media:ro
      - ./results:/results
    networks:
      - stream_net
    depends_on:
      - receiver   # ensures receiver container starts first
    #cpus: 0.05
    #cpu_shares: 2
    #mem_limit: 128m
    #deploy:
      #resources:
        #limits:
          #cpus: '0.05'
          #memory: 128M

  analyser:
    build:
      context: .
      dockerfile: Dockerfile.analyser
    container_name: analyser
    environment:
      - ROLE=analyser
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./framework/media:/media:ro
      - ./results:/results:ro
    depends_on:
      sender:
        condition: service_completed_successfully
      receiver:
        condition: service_completed_successfully

networks:
  stream_net:
    driver: bridge
